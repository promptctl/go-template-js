name: CI

on:
  push:
    branches: [master]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20.19.0
          cache: pnpm

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '^1.21'
          cache-dependency-path: conformance/gen/go.sum

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Test
        run: pnpm test

      # Conformance fixtures are byte-for-byte Go-reference outputs.
      # Regenerate against `text/template` and assert no diff — catches
      # fixture template edits that weren't regen'd, and engine drift in
      # the Go reference itself.
      - name: Conformance fixture parity
        run: |
          pnpm conformance:regen
          git diff --exit-code conformance/fixtures/
